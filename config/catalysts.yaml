  phase3_readout_positive:
    display_name: "Pivotal Phase 3 Readout — Positive"
    sectors: [biotech_pharma, china_biotech_us_pipeline]
    typical_impact: 5
    typical_timeframe: "0-3m"
    direction: bullish

  phase3_readout_negative:
    display_name: "Pivotal Phase 3 Readout — Failed"
    sectors: [biotech_pharma, china_biotech_us_pipeline]
    typical_impact: 5
    typical_timeframe: "0-3m"

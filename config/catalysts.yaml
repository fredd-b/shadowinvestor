# Catalyst type taxonomy
# Each catalyst has: applicable sectors, typical impact, typical timeframe,
# direction, signal patterns to look for, baseline prior (filled in over time from data)

catalysts:

  # ---------- Biotech / Pharma ----------

  fda_approval:
    display_name: "FDA Approval (PDUFA action date — approval)"
    sectors: [biotech_pharma, china_biotech_us_pipeline]
    typical_impact: 5
    typical_timeframe: "0-3m"
    direction: bullish
    patterns:
      - "FDA approves"
      - "approves NDA"
      - "approves BLA"
      - "PDUFA action date"
    baseline_hit_rate: null
    notes: "Single highest-impact catalyst type in biotech. Major spike potential, often >30% in small caps."

  fda_complete_response_letter:
    display_name: "FDA Complete Response Letter (CRL)"
    sectors: [biotech_pharma, china_biotech_us_pipeline]
    typical_impact: 5
    typical_timeframe: "0-3m"
    direction: bearish
    patterns:
      - "complete response letter"
      - "CRL"
      - "FDA declined"
    notes: "Catastrophic for small biotech. Track for short opportunities (later phase) and to AVOID names."

  fda_breakthrough_designation:
    display_name: "FDA Breakthrough Therapy Designation"
    sectors: [biotech_pharma, china_biotech_us_pipeline]
    typical_impact: 4
    typical_timeframe: "0-3m"
    direction: bullish
    patterns:
      - "breakthrough therapy designation"
      - "FDA breakthrough"

  fda_fast_track:
    display_name: "FDA Fast Track Designation"
    sectors: [biotech_pharma, china_biotech_us_pipeline]
    typical_impact: 3
    typical_timeframe: "0-3m"
    direction: bullish

  fda_orphan_drug:
    display_name: "FDA Orphan Drug Designation"
    sectors: [biotech_pharma, china_biotech_us_pipeline]
    typical_impact: 3
    typical_timeframe: "0-3m"
    direction: bullish

  fda_adcom_scheduled:
    display_name: "FDA Advisory Committee Date Scheduled"
    sectors: [biotech_pharma, china_biotech_us_pipeline]
    typical_impact: 3
    typical_timeframe: "0-3m"
    direction: neutral
    notes: "Sets up future binary event. Add to follow-up watchlist with the AdCom date."

  fda_adcom_outcome:
    display_name: "FDA Advisory Committee Vote"
    sectors: [biotech_pharma, china_biotech_us_pipeline]
    typical_impact: 5
    typical_timeframe: "0-3m"
    direction: neutral

  bla_nda_filing_accepted:

# Railway configuration for ShadowInvestor.
#
# Build: Dockerfile-based.
# Start: NOT set here (was previously "uvicorn ... --port ${PORT:-8000}" but
#        Railway's runtime doesn't expand shell vars in startCommand). Each
#        service sets its own startCommand via the dashboard or API:
#          shadowinvestor-api       → "fesi api run"  (reads $PORT in Python)
#          shadowinvestor-scheduler → "fesi schedule run"
#
# The Dockerfile CMD is the fallback if no service-level startCommand is set.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

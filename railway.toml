# Railway configuration for ShadowInvestor.
# Defines two services that share one Docker image:
#   1. shadowinvestor-api       — FastAPI server, public-facing
#   2. shadowinvestor-scheduler — long-running APScheduler, no public port
#
# Both services connect to the same managed Postgres via DATABASE_URL.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# The default service is the API. The scheduler is added as a separate
# service via the Railway dashboard or `railway service create` and shares
# this same source/image but uses startCommand below.
startCommand = "uvicorn fesi.api.main:app --host 0.0.0.0 --port ${PORT:-8000}"
